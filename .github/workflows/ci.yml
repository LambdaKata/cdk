name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Validate repository layout
        run: |
          test -f package.json
          test -f yarn.lock
          node <<'NODE'
          const fs = require('fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const requiredScripts = ['lint', 'test', 'build', 'types'];
          const missingScripts = requiredScripts.filter((name) => !pkg.scripts || !pkg.scripts[name]);

          if (missingScripts.length > 0) {
            console.error(`Missing scripts: ${missingScripts.join(', ')}`);
            process.exit(1);
          }

          if (!pkg.packageManager || !pkg.packageManager.startsWith('yarn@1.')) {
            console.error('packageManager must declare Yarn v1 for deterministic installs.');
            process.exit(1);
          }

          const unsupportedLockfiles = [
            'package-lock.json',
            'pnpm-lock.yaml',
            'poetry.lock',
            'uv.lock',
            'Cargo.lock',
            'go.sum',
          ].filter((file) => fs.existsSync(file));

          if (unsupportedLockfiles.length > 0) {
            console.error(`Unexpected lockfiles found: ${unsupportedLockfiles.join(', ')}`);
            process.exit(1);
          }
          NODE

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run lint
        run: yarn lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run typecheck
        run: yarn types

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run tests
        run: yarn test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --non-interactive

      - name: Run build
        run: yarn build
