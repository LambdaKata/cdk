name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ─── Stage 1: Lint & Typecheck ──────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Validate repository layout
        run: |
          test -f package.json
          test -f yarn.lock
          node <<'NODE'
          const fs = require('fs');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const requiredScripts = ['lint', 'test', 'build', 'types'];
          const missingScripts = requiredScripts.filter((name) => !pkg.scripts || !pkg.scripts[name]);

          if (missingScripts.length > 0) {
            console.error(`Missing scripts: ${missingScripts.join(', ')}`);
            process.exit(1);
          }

          if (!pkg.packageManager || !pkg.packageManager.startsWith('yarn@1.')) {
            console.error('packageManager must declare Yarn v1 for deterministic installs.');
            process.exit(1);
          }

          const unsupportedLockfiles = [
            'package-lock.json',
            'pnpm-lock.yaml',
            'poetry.lock',
            'uv.lock',
            'Cargo.lock',
            'go.sum',
          ].filter((file) => fs.existsSync(file));

          if (unsupportedLockfiles.length > 0) {
            console.error(`Unexpected lockfiles found: ${unsupportedLockfiles.join(', ')}`);
            process.exit(1);
          }
          NODE

